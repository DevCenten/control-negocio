<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Control de Negocio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
</head>
<body class="min-h-screen bg-gray-100 dark:bg-gray-900 p-4">

  <header class="text-center mb-8">
    <h1 class="text-4xl font-bold text-indigo-700 dark:text-indigo-400">Mi Control</h1>
    <p class="text-gray-600 dark:text-gray-400">Lotes • Ventas • Cobros</p>
  </header>

  <main class="max-w-4xl mx-auto space-y-8">
    <div class="grid grid-cols-3 gap-4">
      <button onclick="showForm('lote')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl text-base">
        + Nuevo Lote
      </button>
      <button onclick="showForm('venta')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-2xl text-base">
        + Nueva Venta
      </button>
      <button onclick="showForm('cobro')" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-5 rounded-2xl text-base">
        + Cobro
      </button>
    </div>

    <!-- Formularios -->
    <div id="formLote" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
      <h2 class="text-2xl font-bold mb-5">Nuevo Lote de Carmen</h2>
      <input id="loteId" type="text" placeholder="ID Lote (ej. L05)" class="w-full p-4 mb-4 border rounded-xl">
      <input id="loteFecha" type="date" class="w-full p-4 mb-4 border rounded-xl">
      <input id="loteTotal" type="number" placeholder="Total del lote C$" class="w-full p-4 mb-6 border rounded-xl">
      <button onclick="addLote()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">Guardar Lote</button>
      <button onclick="hideForms()" class="mt-4 w-full text-gray-500">Cancelar</button>
    </div>

    <div id="formVenta" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
      <h2 class="text-2xl font-bold mb-5">Nueva Venta a Crédito</h2>
      <input id="ventaId" type="text" placeholder="ID Venta (ej. V012)" class="w-full p-4 mb-4 border rounded-xl">
      <input id="ventaCliente" type="text" placeholder="Nombre del cliente" class="w-full p-4 mb-4 border rounded-xl">
      <input id="ventaTotal" type="number" placeholder="Precio total C$" class="w-full p-4 mb-4 border rounded-xl">
      <input id="ventaPrima" type="number" placeholder="Prima (0 si ninguna)" class="w-full p-4 mb-4 border rounded-xl">
      <input id="ventaMeses" type="number" placeholder="Meses de crédito" class="w-full p-4 mb-6 border rounded-xl">
      <button onclick="addVenta()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">Guardar Venta</button>
      <button onclick="hideForms()" class="mt-4 w-full text-gray-500">Cancelar</button>
    </div>

    <div id="formCobro" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
      <h2 class="text-2xl font-bold mb-5">Registrar Cobro</h2>
      <input id="cobroIdVenta" type="text" placeholder="ID Venta (ej. V001)" class="w-full p-4 mb-4 border rounded-xl">
      <input id="cobroMonto" type="number" placeholder="Monto cobrado C$" class="w-full p-4 mb-4 border rounded-xl">
      <input id="cobroFecha" type="date" class="w-full p-4 mb-6 border rounded-xl">
      <button onclick="addCobro()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold">Registrar Cobro</button>
      <button onclick="hideForms()" class="mt-4 w-full text-gray-500">Cancelar</button>
    </div>

    <section class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
      <h2 class="text-2xl font-semibold mb-4">Lotes de Carmen</h2>
      <div id="lotes" class="space-y-4"></div>
    </section>

    <section class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
      <h2 class="text-2xl font-semibold mb-4">Ventas Crédito</h2>
      <div id="ventas" class="space-y-4"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
